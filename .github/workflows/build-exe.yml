name: Build Windows EXE

on:
  workflow_dispatch:  # Manual trigger
  push:
    tags:
      - 'v*'  # Auto-build on version tags

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pygame numpy pyinstaller

      - name: Build English EXE
        run: |
          pyinstaller --onefile --windowed --name CelleR_EN cell_evolution_en.py

      - name: Build Hungarian EXE
        run: |
          pyinstaller --onefile --windowed --name CelleR_HU cell_evolution.py

      - name: Upload English EXE
        uses: actions/upload-artifact@v4
        with:
          name: CelleR-EN-Windows
          path: dist/CelleR_EN.exe

      - name: Upload Hungarian EXE
        uses: actions/upload-artifact@v4
        with:
          name: CelleR-HU-Windows
          path: dist/CelleR_HU.exe
